<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Senti-Trade.ai Premium Gauge</title>
    <style>
      /* --- CORE STYLES --- */
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #030712; /* Deep background to match image */
        font-family: "Inter", sans-serif; /* Use a clean, professional font */
      }

      /* --- THE GAUGE CONTAINER (Tailwind: relative w-[350px] h-[350px] ...) --- */
      .gauge-container {
        position: relative;
        width: 350px;
        height: 350px;
        background: #0f172a; /* Card background */
        border-radius: 20px;
        border: 1px solid #1e293b;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;

        /* DYNAMIC VALUE: Change this --value to update the gauge (0-100) */
        --value: 78;

        /* Calculate rotation: Maps 0-100 to -90deg to 90deg */
        --rotation: calc((var(--value) * 1.8deg) - 90deg);
      }

      /* --- SVG GAUGE ELEMENTS --- */
      .gauge-svg {
        z-index: 10;
      }

      .gauge-arc {
        fill: none;
        stroke-width: 14;
        stroke-linecap: round;
      }

      /* --- THE NEEDLE & HUB --- */
      .gauge-needle {
        position: absolute;
        bottom: 50%; /* Position base at the center */
        left: calc(50% - 2px); /* Center horizontally, adjusting for width */
        width: 4px;
        height: 100px; /* Needle length */
        background: #ffffff;
        border-radius: 4px;

        /* Sets the pivot point to the bottom center of the needle */
        transform-origin: bottom center;

        /* Applies the dynamic rotation calculated above */
        transform: rotate(calc(var(--rotation)));

        /* Professional animation timing */
        transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);

        z-index: 20;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
      }

      .gauge-hub {
        position: absolute;
        bottom: calc(50% - 12px); /* Centered at the arc's focus point */
        left: calc(50% - 12px);
        width: 24px;
        height: 24px;
        background: #14b8a6; /* Main hub color */
        border-radius: 50%;
        border: 4px solid #0f172a; /* Matches card background */
        z-index: 30;
        box-shadow: 0 0 15px #14b8a6;
      }

      /* --- BOTTOM TEXT BLOCK --- */
      .gauge-value-block {
        margin-top: 10px;
        z-index: 40;
        text-align: center;
      }

      /* Premium Gradient Text for the Value */
      .gauge-value-text {
        font-size: 56px;
        font-weight: 900;
        line-height: 1;
        margin: 0;
        background: linear-gradient(135deg, #14b8a6, #a5f3fc);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-family: "Montserrat", sans-serif; /* Optional: Extra bold font */
      }

      .gauge-label-text {
        font-size: 11px;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        margin-top: 6px;
      }

      /* --- MAGICAL BACKGROUND GLOWS & PARTICLES --- */
      .magical-overlay {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }

      /* Main swirling core glow */
      .ambient-glow {
        position: absolute;
        width: 90%;
        height: 90%;
        left: 5%;
        top: 5%;
        border-radius: 50%;
        background: linear-gradient(-45deg, #0f172a, #1e293b, #1e1b4b, #030712);
        background-size: 200% 200%;
        filter: blur(100px);
        animation: gradientSwirl 12s ease infinite;
        opacity: 0.6;
      }

      /* Individual particles with glow/float animations */
      .particle {
        position: absolute;
        border-radius: 50%;
        opacity: 0;
        animation: particleFloat 6s ease-in-out infinite;
      }

      /* Particle 1: Purple */
      .p1 {
        top: 20%;
        left: 15%;
        width: 4px;
        height: 4px;
        background: #a855f7;
        box-shadow: 0 0 10px #a855f7;
        animation-delay: 0s;
      }
      /* Particle 2: Cyan */
      .p2 {
        top: 60%;
        right: 10%;
        width: 5px;
        height: 5px;
        background: #22d3ee;
        box-shadow: 0 0 10px #22d3ee;
        animation-delay: 1.5s;
      }
      /* Particle 3: Pink */
      .p3 {
        top: 35%;
        right: 20%;
        width: 3px;
        height: 3px;
        background: #ec4899;
        box-shadow: 0 0 10px #ec4899;
        animation-delay: 3s;
      }
      /* Particle 4: Blue */
      .p4 {
        bottom: 15%;
        left: 30%;
        width: 4px;
        height: 4px;
        background: #3b82f6;
        box-shadow: 0 0 10px #3b82f6;
        animation-delay: 0.5s;
      }

      /* --- ANIMATIONS --- */
      @keyframes gradientSwirl {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      @keyframes particleFloat {
        0%,
        100% {
          transform: translateY(0) scale(1);
          opacity: 0;
        }
        30%,
        70% {
          opacity: 0.8;
        }
        50% {
          transform: translateY(-40px) scale(1.3);
          opacity: 1;
        }
      }

      /* Ticks/Labels (Optional, but included for complete visibility) */
      .tick-label {
        position: absolute;
        font-size: 12px;
        font-weight: bold;
        color: #e9e6e2;
        z-index: 15;
      }
      .tick-0 {
        bottom: 45%;
        left: 25px;
      }
      .tick-50 {
        top: 18%;
        left: calc(50% - 10px);
      }
      .tick-100 {
        bottom: 45%;
        right: 25px;
      }
    </style>
  </head>
  <body>
    <div class="gauge-container" style="--value: 78">
      <div class="magical-overlay">
        <div class="ambient-glow"></div>
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
      </div>

      <svg width="240" height="130" viewBox="0 0 240 130" class="gauge-svg">
        <defs>
          <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="coloredBlur" />
            <feMerge>
              <feMergeNode in="coloredBlur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <path
          d="M 30 110 A 90 90 0 0 1 210 110"
          class="gauge-arc"
          stroke="#1e293b"
        />

        <path
          d="M 30 110 A 90 90 0 0 1 102 38"
          class="gauge-arc"
          stroke="#ef4444"
          filter="url(#glow)"
        />

        <path
          d="M 138 38 A 90 90 0 0 1 210 110"
          class="gauge-arc"
          stroke="#22c55e"
          filter="url(#glow)"
        />
      </svg>

      <div class="tick-label tick-0">0</div>
      <div class="tick-label tick-50">50</div>
      <div class="tick-label tick-100">100</div>

      <div class="gauge-hub"></div>

      <div class="gauge-needle"></div>

      <div class="gauge-value-block">
        <p class="gauge-value-text" id="gaugeValue">78</p>
        <p class="gauge-label-text">Market Sentiment</p>
      </div>
    </div>

    <script>
      const container = document.querySelector(".gauge-container");
      const valueText = document.getElementById("gaugeValue");

      function updateGauge(newValue) {
        // Update the CSS variable (drives the needle rotation)
        container.style.setProperty("--value", newValue);

        // Update the displayed number immediately
        valueText.textContent = Math.round(newValue);
      }

      // --- Demo Loop (Deactivate for your final project) ---
      setInterval(() => {
        const newValue = Math.floor(Math.random() * 101); // Random 0-100
        updateGauge(newValue);
      }, 3000); // Update every 3 seconds

      // Initialize with the static value set in the HTML style attribute
      updateGauge(78);
    </script>
  </body>
</html>
